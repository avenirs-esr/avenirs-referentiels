spring.config.import=optional:classpath:env.properties
spring.application.name=avenirs-referentiels
server.port=10000

# logging
logging.level.root=${LOGGING_LEVEL_ROOT}
logging.level.fr.avenirsesr=${LOGGING_LEVEL_AVENIRSESR}
logging.level.org.springframework.boot.web.embedded.tomcat=${LOGGING_LEVEL_TOMCAT}


# Persistence
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto = update

